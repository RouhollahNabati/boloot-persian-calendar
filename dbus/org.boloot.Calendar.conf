<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="org.boloot.Calendar"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.boloot.Calendar"
           send_interface="org.boloot.Calendar"/>
    <allow receive_sender="org.boloot.Calendar"/>
  </policy>
</busconfig>
